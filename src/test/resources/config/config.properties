# Appium Configuration
appium.server.url=http://127.0.0.1:4723

# Platform (android/ios)
platform=android

# App Path (relative to project root)
app.path=apps/MPL.apk

# Wait Configuration
implicit.wait=10
explicit.wait=30

# Cloud Execution
cloud.execution=false
cloud.provider=browserstack

# BrowserStack Configuration
browserstack.username=YOUR_USERNAME
browserstack.accesskey=YOUR_ACCESS_KEY
browserstack.app=bs://YOUR_APP_ID

# SauceLabs Configuration
saucelabs.username=YOUR_USERNAME
saucelabs.accesskey=YOUR_ACCESS_KEY
saucelabs.datacenter=us-west-1

# LambdaTest Configuration
lambdatest.username=YOUR_USERNAME
lambdatest.accesskey=YOUR_ACCESS_KEY

# Test Environment
env=qa
